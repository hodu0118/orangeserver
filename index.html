<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>오렌지야생 서버</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background:#ffffff; color:#111827; }
    header { padding: 20px; background:#ffffff; border-bottom:2px solid #e5e7eb; }
    nav a { margin-right: 16px; color:#2563eb; text-decoration:none; font-weight:700; }
    nav a:hover { text-decoration:underline; }
    main { padding: 40px; max-width: 900px; margin: auto; }
    .card { border:2px solid #e5e7eb; border-radius:20px; padding:28px; margin-bottom:24px; }
    .btn { display:inline-block; padding:14px 20px; border-radius:14px; background:#2563eb; color:white; text-decoration:none; font-weight:800; }
    .btn.buy { background:#dc2626; }
    .product { display:flex; justify-content:space-between; align-items:center; gap:20px; }
    footer { padding: 20px; color:#6b7280; border-top:2px solid #e5e7eb; text-align:center; }
  </style>
</head>
<body>
  <header>
    <h1>🍊 오렌지시티</h1>
    <nav>
      <a href="#/">홈</a>
      <a href="#/explain">설명</a>
    </nav>
  </header>

  <main id="app"></main>

  <footer>
    © OrangeCity Server
  </footer>

  <script>
    const app = document.getElementById('app');

    const pages = {
      '/': `
        <div class="card">
          <h2>현실형 도시 서버</h2>
          <p>오렌지시티는 도시 RP 기반의 자유 서버입니다.</p>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a class="btn" href="#/expain"> 서버 안내</a>
            <a class="btn" href="#/request">📩 요청 / 코멘트 ( 추후 실제로 메시지 가는 기능 만들 예정)</a>
            <a class="btn" href="#/op">🛡 OP 요청 ( 추후 실제로 메시지 가는 기능 만들 예정)</a>
            <a class="btn" href="https://discord.gg/PuesAx4S" target="_blank">💬 공식 디스코드</a>
          </div>
        </div>
      `,
      '/explain': `
        <div class="card">
          <h2>서버 안내</h2>
          <div class="product">
            <div>
              <p>오렌지 야생 서버는 무정부 서버입니다!
              2b2t.한국의 모티브로 만든 오렌지 무정부 서버를 많이 와주세요!</p>
            <div>
          </div>
        </div>
      `,
      '/request': `
        <div class="card">
          <h2>📩 요청 & 코멘트</h2>
          <p>서버에 바라는 점이나 개선 아이디어를 적어주세요.</p>
          <textarea placeholder="요청사항을 입력하세요" style="width:100%; height:120px; padding:12px; border-radius:12px; border:2px solid #e5e7eb;"></textarea>
          <br><br>
          <button class="btn" onclick="alert(아직 실현 안된 기능입니다!)">ㅇㅇ 알겠다</button>
        </div>
      `,
      '/op': `
        <div class="card">
          <h2>🛡 OP 요청</h2>
          <p>관리자(OP) 권한은 신중히 검토 후 지급됩니다.</p>
          <ul>
            <li>디스코드 활동 이력</li>
            <li>서버 기여도</li>
            <li>규칙 이해도</li>
          </ul>
          <button class="btn" onclick="alert(아직 실현 되지 않은 기능입니다!)">ㅇㅇ 기다릴게</button>
        </div>
      `
    };

    function buy() {
      alert('AK-47 구매 요청이 접수되었습니다!\n(실제 지급은 게임 내에서 처리됩니다)');
    }

    function render() {
      const route = location.hash.replace('#', '') || '/';
      app.innerHTML = pages[route] || '<div class="card"><h2>404</h2><p>페이지를 찾을 수 없습니다.</p></div>';
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
